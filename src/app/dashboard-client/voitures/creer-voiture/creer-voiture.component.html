<div class="container-fluid pt-4 px-4">
  <div class="row g-4">
    <div class="col">
      <div class="bg-secondary rounded h-100 p-4">
        <a class="link-primary" [routerLink]="'/client/voitures/liste/'+lastPageVisited"><i class="bi-arrow-left me-2"></i>Retour</a>
        <br><br>
        <h3>Ajouter une voiture</h3>
        <form [formGroup]="voitureForm" (ngSubmit)="creerVoiture()">
          <div class="form-floating mb-3">
            <textarea class="form-control" placeholder="Leave a comment here"
                      id="floatingTextarea" formControlName="description" style="height: 150px;"></textarea>
            <label for="floatingTextarea">Description</label>
          </div>
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="immatriculationInput"
                   placeholder="name@example.com" formControlName="immatriculation">
            <label for="immatriculationInput">Immatriculation</label>
          </div>
          <hr>
          <h4>Caractéristiques</h4>
          <div class=" col-6">
            <table class="table table-dark">
              <thead>
              <tr>
                <th scope="col">Caractéristique</th>
                <th scope="col">Valeur</th>
              </tr>
              </thead>
              <tbody>
              @for(caracteristique of caracteristiques();track $index){
                <tr>
                  <th scope="row">{{ caracteristique.nom }}</th>
                  <td>{{ caracteristique.valeur }}</td>
                </tr>
              }
              </tbody>
            </table>
          </div>
          <div class="form-floating mb-3 col-3">
            <input type="text" class="form-control" id="nomCaracteristique"
                   placeholder="name@example.com" [formControl]="nomCaracteristique">
            <label for="nomCaracteristique">Nom caractéristique</label>
          </div>
          <div class="form-floating mb-3 col-3">
            <input type="text" class="form-control" id="valeurCaracteristique"
                   placeholder="name@example.com" [formControl]="valeurCaracteristique">
            <label for="valeurCaracteristique">Valeur caractéristique</label>
          </div>
          <button type="button" class="btn btn-warning" (click)="ajouterCaracteristique()"><i class="bi-plus me-2"></i>Ajouter la caractéristique</button>
          <p class="mt-3" style="color: red">{{ erreurCaracteristique() }}</p>
          <hr>
          <button type="submit" class="btn-primary btn"><i class="bi-check me-2"></i>Créer la voiture</button>
          <br>
          <p class="mt-3" style="color: red">{{ erreur() }}</p>
        </form>
      </div>
    </div>
  </div>
</div>
