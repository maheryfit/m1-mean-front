<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div class="container">
    <div class="row vh-100">
      <div class="col-3 vstack bg-dark text-light">
        <div class="row p-3 fs-3 fw-bold">
          <p><img src="/favicon.ico" alt="icon"><span class="p-3">{{ brand }}</span></p>
          <hr>
        </div>
        <div class="row">
          <div class="container-fluid">
            <div class="row">
              <button class="fs-5 btn btn-outline-light border border-0 text-start rounded-0 p-3 ps-4"><i class="bi-car-front-fill"></i><span class="p-3">Voiture</span></button>
            </div>
            <div class="row">
              <button class="fs-5 btn btn-outline-light border border-0 text-start rounded-0 p-3 ps-4"><i class="bi-wrench"></i><span class="p-3">Réparations</span></button>
            </div>
          </div>
        </div>
        <div class="row mt-3 p-3">
          <button type="button" class="btn btn-light rounded-pill p-3 ps-3"><i class="bi-list"></i><span class="p-3">Demander un RDV</span></button>
        </div>
        <div class="row mx-auto mt-auto p-3">
          <!-- <button type="button" class="btn btn-dark"><span class="pe-2">JSmith304</span><i class="bi-caret-down-fill"></i></button> -->
          <div class="dropdown">
            <button class="btn btn-dark dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi-person-circle me-2"></i>JSmith304
            </button>
            <ul class="dropdown-menu dropdown-menu-dark">
              <li><a class="dropdown-item" href="#"><i class="bi-person-fill me-2"></i>Profil</a></li>
              <li><a class="dropdown-item" href="#"><i class="bi-box-arrow-left me-2 text-danger"></i>Se déconnecter</a></li>
            </ul>
          </div>
        </div>
      </div>
      <div class="col-9">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</body>
</html>
