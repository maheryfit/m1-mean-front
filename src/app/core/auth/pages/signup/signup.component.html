<div class="container">
  <div class="row align-items-center justify-content-center vh-100">
    <div class="col-4 border border-secondary p-5 bg-dark text-light">
      <p class="d-flex"><img ngSrc="/favicon.ico" alt="logo" width="64" height="64"><span class="ps-3 fs-1 fw-bold">{{brand}}</span></p>
      <hr>
      <div class="mt-5">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="floatingInput" placeholder="Nom">
          <label for="floatingInput">Nom</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="floatingInput" placeholder="Prénom">
          <label for="floatingInput">Prénom</label>
        </div>
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="floatingInput" placeholder="Nom d'utilisateur">
          <label for="floatingInput"><i class="bi-person-circle me-2"></i>Nom d'utilisateur</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Mot de passe">
          <label for="floatingPassword"><i class="bi-lock me-2"></i>Mot de passe</label>
        </div>
        <div class="form-floating">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Mot de passe">
          <label for="floatingPassword"><i class="bi-lock-fill me-2"></i>Confirmer le mot de passe</label>
        </div>
      </div>
      <div class="vstack mt-5">
        <button class="btn btn-primary p-3 mx-auto"><i class="bi-pencil me-2"></i>S'inscrire</button>
        <a href="/login" class="link-primary mx-auto mt-3">J'ai déjà un compte</a>
      </div>
    </div>
  </div>
</div>
