<article class="container-fluid pt-4 px-4">
    <div class="row g-4">
        <div class="col">
            <div class="bg-secondary rounded h-100 p-4">
                <h3 class="mb-3">Mécaniciens</h3>
                <p class="fw-bold fs-4 text-white mt-4">Nombres de mécanicien: {{ count() }}</p>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nom utilisateur</th>
                            <th>Rôle</th>
                            <th>Niveau</th>
                            <th>Téléphone</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        @for (mecanicien of mecaniciens(); track $index) {
                            <tr>
                                <td>{{ mecanicien.utilisateur.nom_utilisateur }}</td>
                                <td>{{ mecanicien.role }}</td>
                                <td>{{ mecanicien.niveau }}</td>
                                <td>{{ mecanicien.telephone }}</td>
                                <td>
                                    <button (click)="removeMecanicien(mecanicien.idmecanicien)" class="btn btn-outline-primary m-2">Supprimer</button>
                                    <a class="btn btn-warning m-2">Modifier</a>
                                </td>
                            </tr>
                        }
                    </tbody>
                </table>
                <br />
                <app-pagination [count]="countSignal" [list]="mecaniciensSignal" [getAllPaginate]="mecanicienService.getAllPaginate.bind(mecanicienService)" [getCount]="mecanicienService.getCount.bind(mecanicienService)" />
            </div>
        </div>
    </div>
</article>
