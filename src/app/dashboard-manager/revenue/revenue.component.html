<div class="row mt-5 px-4 px-md-4">
  <article class="col-8 col-md-8" id="chartRevenueAnnuel">
    <h2>Revenue mensuel</h2>
    <canvas class="bg-secondary" id="canvasRevenue">{{chartRevenue}}</canvas>
  </article>
  <form [formGroup]="yearFormRevenue" (ngSubmit)="getRevenueFromYearForm()" class="col-2 col-md-2">
    <label class="form-label" for="yearRevenue">Année</label>
    <select id="yearRevenue" formControlName="year" class="form-select">
      @for (year of years; track $index) {
        @if (year === this.yearFormRevenue.value.year) {
          <option selected="{{ true }}" value="{{ year }}"> {{ year }}</option>
        } @else {
          <option selected="{{ false }}" value="{{ year }}"> {{ year }}</option>
        }
      }
    </select>
    <button type="submit" class="btn mt-3 btn-danger">Rechercher</button>
  </form>
</div>
<div class="row mt-5 px-4 px-md-4">
  <article class="col-8 col-md-8" id="chartBeneficeAnnuel">
      <h2>Bénéfice mensuel</h2>
      <canvas class="bg-secondary" id="canvasBenefice">{{chartBenefice}}</canvas>
  </article>
  <form [formGroup]="yearFormBenefice" (ngSubmit)="getBeneficeFromYearForm()" class="col-2 col-md-2">
      <label class="form-label" for="yearBenefice">Année</label>
      <select id="yearBenefice" formControlName="year" class="form-select">
          @for (year of years; track $index) {
              @if (year === this.yearFormBenefice.value.year) {
                  <option selected="{{ true }}" value="{{ year }}"> {{ year }}</option>
              } @else {
                  <option selected="{{ false }}" value="{{ year }}"> {{ year }}</option>
              }
          }
      </select>
      <button type="submit" class="btn mt-3 btn-danger">Rechercher</button>
  </form>
</div>
